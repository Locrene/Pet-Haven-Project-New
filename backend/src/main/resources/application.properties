# Server Configuration
server.port=8080

# Database Configuration (H2 for local development)
spring.datasource.url=jdbc:h2:mem:pethaven
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=bXlTZWNyZXRLZXlGb3JQZXRIZWF2ZW5BcHBsaWNhdGlvbjEyMzQ1Njc4OTA=
jwt.expiration=86400000

# Updated CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:3001
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Content-Type,Authorization

# Added comments for clarity
# JWT secret key for token generation
jwt.secret=bXlTZWNyZXRLZXlGb3JQZXRIZWF2ZW5BcHBsaWNhdGlvbjEyMzQ1Njc4OTA=
# Token expiration time in milliseconds (1 day)
jwt.expiration=86400000

# Logging
logging.level.com.pethaven=DEBUG
logging.level.org.springframework.security=DEBUG